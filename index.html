<!DOCTYPE html>

<html>

<head>
<title>Lung Cancer Detection</title>

<style>

body{
margin:0;
font-family:'Segoe UI';
background:#ffffff;
color:#333;
}

.container{
width:85%;
margin:40px auto;
background:#ffffff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

h2{
color:#2e7d32;
}

input,select{
padding:12px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;
background:#f5f5f5;
}

button{
padding:12px 25px;
background:linear-gradient(45deg,#4CAF50,#81C784);
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

button:hover{
background:linear-gradient(45deg,#388E3C,#66BB6A);
}

img{
width:280px;
border-radius:15px;
margin:10px;
}

table{
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #ccc;
padding:12px;
}

th{
background:#4CAF50;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>🧠 Lung Cancer Detection System</h2>

<form method="POST" action="/predict" enctype="multipart/form-data">

<h3>👤 Patient Details</h3>

<input name="name" placeholder="Patient Name" required>
<input name="age" placeholder="Age" required>

<select name="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<br><br>

<input type="file" name="file" required>

<br><br>

<button type="submit">🔍 Predict</button>

</form>

{% if prediction %}

<h2>Prediction: {{prediction}}</h2>

<h3>Probability: {{probability}}</h3>

<h3>Uploaded CT Image</h3>
<img src="{{ url_for('static', filename=image) }}">

<h3>Extracted ROI</h3>
<img src="{{ url_for('static', filename=roi) }}">

<h3>Probability Range</h3>

<table>

<tr>
<th>Class</th>
<th>Range</th>
</tr>

<tr>
<td>Normal</td>
<td>0.000 – 0.400</td>
</tr>

<tr>
<td>Benign</td>
<td>0.401 – 0.700</td>
</tr>

<tr>
<td>Malignant</td>
<td>0.701 – 1.000</td>
</tr>

</table>

{% endif %}

</div>

</body>
</html>
